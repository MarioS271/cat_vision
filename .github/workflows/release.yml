name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🪟 Strip Windows-specific Gradle JDK path
        run: sed -i '/org\.gradle\.java\.home/d' gradle.properties

      - name: 🖥️ Make gradlew executable
        run: chmod +x gradlew

      - name: 🛠️ Build
        run: ./gradlew build

      - name: 📂 Stage release artifacts
        run: |
          mkdir staging
          find fabric/build/libs forge/build/libs \
            \( -name "*-sources.jar" -o \( -name "*.jar" ! -name "*-dev*" ! -name "*-sources*" \) \) \
            -exec cp {} staging/ \;

      - name: 🚀 Publish to GitHub Releases, Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: staging/*.jar

          name: CatVision ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
