name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🪟 Strip Windows-specific Gradle JDK path
        run: sed -i '/org\.gradle\.java\.home/d' gradle.properties

      - name: 🖥️ Make gradlew executable
        run: chmod +x gradlew

      - name: 🛠️ Build
        run: ./gradlew build

      - name: 🚀 Publish to GitHub Releases, Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.0
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_API_TOKEN }}

          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            fabric/build/libs/cat_vision-fabric-+([0-9]).+([0-9])*.jar
            forge/build/libs/cat_vision-forge-+([0-9]).+([0-9])*.jar
          files-secondary: |
            fabric/build/libs/cat_vision-fabric-*-sources.jar
            forge/build/libs/cat_vision-forge-*-sources.jar

          name: CatVision ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md*

          game-versions: 1.16.5
          loaders: |
            fabric
            forge
          java: 8
